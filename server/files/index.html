<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Movies!</title>
    <style>
        body {
            font-family: 'Trebuchet MS', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        article {
            background-color: white;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        img {
            border-radius: 6px;
            max-width: 200px;
            margin-right: 20px;
            float: left;
        }
        h1 {
            margin: 0 0 10px 0;
        }
        .genre {
            background-color: #007bff;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            margin-right: 8px;
            margin-bottom: 5px;
            display: inline-block;
            font-size: 0.9em;
        }
        .plot {
            clear: both;
            margin-top: 15px;
            line-height: 1.6;
        }
    </style>
    <script>
        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const body = document.querySelector("body")
                if (xhr.status == 200) {
                    const movies = JSON.parse(xhr.responseText)
                    
                    movies.forEach(movie => {
                        const article = document.createElement('article')
                        
                        const img = document.createElement('img')
                        img.src = movie.Poster
                        img.alt = movie.Title
                        img.crossOrigin = 'anonymous'
                        
                        const title = document.createElement('h1')
                        title.textContent = movie.Title
                        
                        const info = document.createElement('p')
                        info.innerHTML = `<strong>Runtime:</strong> ${movie.Runtime} min | <strong>Released:</strong> ${new Date(movie.Released).toLocaleDateString()}`
                        
                        const genresDiv = document.createElement('p')
                        movie.Genres.forEach(g => {
                            const span = document.createElement('span')
                            span.className = 'genre'
                            span.textContent = g
                            genresDiv.appendChild(span)
                        })
                        
                        const details = document.createElement('p')
                        details.innerHTML = `
                            <strong>Director:</strong> ${movie.Directors.join(', ')}<br>
                            <strong>Writer:</strong> ${movie.Writers.join(', ')}<br>
                            <strong>Actors:</strong> ${movie.Actors.join(', ')}<br>
                            <strong>Ratings:</strong> IMDb ${movie.imdbRating}/10 | Metascore ${movie.Metascore}
                        `
                        
                        const plot = document.createElement('p')
                        plot.className = 'plot'
                        plot.textContent = movie.Plot
                        
                        article.appendChild(img)
                        article.appendChild(title)
                        article.appendChild(info)
                        article.appendChild(genresDiv)
                        article.appendChild(details)
                        article.appendChild(plot)
                        
                        body.appendChild(article)
                    })
                } else {
                    body.append("Error loading movies. Status " + xhr.status)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
